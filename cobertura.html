<!-- HERO -->
<section class="hero">
    <h1>Consulta tu cobertura</h1>
    <p>Selecciona tu zona para verificar disponibilidad</p>
</section>

<!-- MENÚ DE ZONAS -->
<section class="cobertura">

    <h2>📡 Consulta tu cobertura</h2>
    <p>Selecciona tu ubicación</p>

    <div class="filtros">

        <!-- ESTADO -->
        <select id="estado" onchange="cargarMunicipios()">
            <option value="">Selecciona estado</option>
            <option value="hidalgo">Hidalgo</option>
            <option value="EdoMex">Estado de México</option>
        </select>

        <!-- MUNICIPIO -->
        <select id="municipio" onchange="cargarComunidades()">
            <option value="">Selecciona municipio</option>
        </select>

        <!-- COMUNIDAD -->
        <select id="comunidad">
            <option value="">Selecciona comunidad</option>
        </select>

    </div>

    <br>

    <button onclick="consultarCobertura()" class="btn">
        Consultar disponibilidad
    </button>

    <p id="resultado"></p>

</section>
